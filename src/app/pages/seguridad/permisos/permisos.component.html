<div class="page-container">

    <div class="page-header">
        <div>
            <h1 class="page-title">
                <mat-icon>lock</mat-icon>
                Permisos
            </h1>
            <p class="page-subtitle">Gestión de permisos del sistema</p>
        </div>
        <button *appPermiso="'permisos.crear'" mat-raised-button color="primary" (click)="abrirFormulario()">
            <mat-icon>add</mat-icon>
            Nuevo Permiso
        </button>
    </div>

    <mat-card class="table-card">
        <mat-card-content>

            <div class="table-toolbar">
                <mat-form-field appearance="outline" class="filtro-field">
                    <mat-label>Buscar permiso</mat-label>
                    <input matInput (keyup)="filtrar($event)" placeholder="Ej: usuarios.crear">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>

            <table mat-table [dataSource]="dataSource" matSort class="w-100">

                <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Permiso</th>
                    <td mat-cell *matCellDef="let row">
                        <code>{{ row.nombre }}</code>
                    </td>
                </ng-container>

                <ng-container matColumnDef="nombreMenu">
                    <th mat-header-cell *matHeaderCellDef>Menú</th>
                    <td mat-cell *matCellDef="let row">
                        {{ row.nombreMenu ?? '—' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef>Acciones</th>
                    <td mat-cell *matCellDef="let row">
                        <div class="acciones">
                            <button *appPermiso="'permisos.actualizar'" mat-icon-button color="primary"
                                matTooltip="Editar" (click)="editar(row)">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button *appPermiso="'permisos.eliminar'" mat-icon-button color="warn" matTooltip="Eliminar"
                                (click)="confirmarEliminar(row)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="columnas"></tr>
                <tr mat-row *matRowDef="let row; columns: columnas;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell sin-datos" [attr.colspan]="columnas.length">
                        <mat-icon>inbox</mat-icon>
                        <p>No se encontraron permisos</p>
                    </td>
                </tr>

            </table>

            <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />

        </mat-card-content>
    </mat-card>

    <!-- --Cargando -->
    @if (cargando() && dataSource.data.length === 0) {
    <div class="loader-overlay">
        <div class="neon-ring"></div>
    </div>
    }

</div>
