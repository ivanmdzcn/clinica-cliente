<form [formGroup]="form" (ngSubmit)="guardar()">

    <h2 mat-dialog-title>
        <mat-icon>{{ modoEdicion ? 'edit' : 'local_hospital' }}</mat-icon>
        {{ modoEdicion ? 'Editar Especialidad' : 'Nueva Especialidad' }}
    </h2>

    <mat-dialog-content>
        <div class="form-grid">

            <mat-form-field appearance="outline">
                <mat-label>Nombre *</mat-label>
                <input matInput formControlName="nombre" placeholder="Ej: Cardiología">
                <mat-icon matSuffix>local_hospital</mat-icon>
                @if (nombre.hasError('required') && nombre.touched) {
                    <mat-error>El nombre es obligatorio</mat-error>
                }
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Descripción</mat-label>
                <textarea matInput formControlName="descripcion" rows="2"></textarea>
            </mat-form-field>

        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button type="button" (click)="cerrar()" [disabled]="cargando()">
            Cancelar
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="cargando()">
            @if (cargando()) {
                <mat-spinner diameter="20" />
            } @else {
                <ng-container>
                    <mat-icon>save</mat-icon>
                    {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
                </ng-container>
            }
        </button>
    </mat-dialog-actions>

</form>
